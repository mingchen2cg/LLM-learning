<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a5acd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contextGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a52;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#1a1a1a"/>
  
  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold">
    上下文增强检索RAG：智能文档检索与上下文扩展
  </text>
  
  <!-- 步骤1：查询输入 -->
  <text x="60" y="100" fill="#ffffff" font-size="18" font-weight="bold">步骤1：查询输入与向量化</text>
  
  <rect x="60" y="120" width="180" height="60" rx="8" fill="url(#primaryGrad)" stroke="#ffffff" stroke-width="2"/>
  <text x="150" y="140" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">用户查询</text>
  <text x="150" y="155" text-anchor="middle" fill="#ffffff" font-size="10">"什么是机器学习？"</text>
  <text x="150" y="170" text-anchor="middle" fill="#ffffff" font-size="10">Query</text>
  
  <!-- 箭头1 -->
  <path d="M 250 150 L 290 150" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="300" y="120" width="120" height="60" rx="8" fill="url(#secondaryGrad)" stroke="#ffffff" stroke-width="2"/>
  <text x="360" y="140" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">向量化</text>
  <text x="360" y="155" text-anchor="middle" fill="#ffffff" font-size="9">create_embeddings()</text>
  <text x="360" y="170" text-anchor="middle" fill="#ffffff" font-size="9">[0.1, 0.3, -0.2, ...]</text>
  
  <!-- 步骤2：文档库 -->
  <text x="60" y="240" fill="#ffffff" font-size="18" font-weight="bold">步骤2：文档库与相似度计算</text>
  
  <!-- 文档片段 -->
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#444444" stroke="#666666" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" fill="#cccccc" font-size="8">片段0</text>
    <text x="40" y="28" text-anchor="middle" fill="#cccccc" font-size="7">关于历史</text>
    <text x="40" y="55" text-anchor="middle" fill="#ffcc00" font-size="7">相似度: 0.2</text>
  </g>
  
  <g transform="translate(160, 260)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#444444" stroke="#666666" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" fill="#cccccc" font-size="8">片段1</text>
    <text x="40" y="28" text-anchor="middle" fill="#cccccc" font-size="7">算法基础</text>
    <text x="40" y="55" text-anchor="middle" fill="#ffcc00" font-size="7">相似度: 0.7</text>
  </g>
  
  <g transform="translate(260, 260)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="url(#contextGrad)" stroke="#ff6b6b" stroke-width="2"/>
    <text x="40" y="15" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="bold">片段2</text>
    <text x="40" y="28" text-anchor="middle" fill="#ffffff" font-size="7">机器学习</text>
    <text x="40" y="55" text-anchor="middle" fill="#ffffff" font-size="7">相似度: 0.95</text>
  </g>
  
  <g transform="translate(360, 260)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#444444" stroke="#666666" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" fill="#cccccc" font-size="8">片段3</text>
    <text x="40" y="28" text-anchor="middle" fill="#cccccc" font-size="7">深度学习</text>
    <text x="40" y="55" text-anchor="middle" fill="#ffcc00" font-size="7">相似度: 0.8</text>
  </g>
  
  <g transform="translate(460, 260)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#444444" stroke="#666666" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" fill="#cccccc" font-size="8">片段4</text>
    <text x="40" y="28" text-anchor="middle" fill="#cccccc" font-size="7">数据科学</text>
    <text x="40" y="55" text-anchor="middle" fill="#ffcc00" font-size="7">相似度: 0.6</text>
  </g>
  
  <!-- 步骤3：上下文扩展 -->
  <text x="60" y="380" fill="#ffffff" font-size="18" font-weight="bold">步骤3：上下文扩展 (context_size=1)</text>
  
  <!-- 最佳匹配片段标识 -->
  <text x="300" y="340" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">最高相似度片段</text>
  <path d="M 300 345 L 300 355" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 上下文扩展示意 -->
  <g transform="translate(160, 400)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="#6a5acd" stroke="#8a7adf" stroke-width="2" opacity="0.8"/>
    <text x="40" y="18" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">上下文片段</text>
    <text x="40" y="32" text-anchor="middle" fill="#ffffff" font-size="8">片段1: 算法基础</text>
    <text x="40" y="45" text-anchor="middle" fill="#ffffff" font-size="7">邻近上下文</text>
  </g>
  
  <g transform="translate(260, 400)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="url(#contextGrad)" stroke="#ff6b6b" stroke-width="3"/>
    <text x="40" y="18" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">目标片段</text>
    <text x="40" y="32" text-anchor="middle" fill="#ffffff" font-size="8">片段2: 机器学习</text>
    <text x="40" y="45" text-anchor="middle" fill="#ffffff" font-size="7">核心内容</text>
  </g>
  
  <g transform="translate(360, 400)">
    <rect x="0" y="0" width="80" height="50" rx="4" fill="#6a5acd" stroke="#8a7adf" stroke-width="2" opacity="0.8"/>
    <text x="40" y="18" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">上下文片段</text>
    <text x="40" y="32" text-anchor="middle" fill="#ffffff" font-size="8">片段3: 深度学习</text>
    <text x="40" y="45" text-anchor="middle" fill="#ffffff" font-size="7">邻近上下文</text>
  </g>
  
  <!-- 范围指示 -->
  <rect x="150" y="390" width="300" height="70" rx="8" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="300" y="475" text-anchor="middle" fill="#ffcc00" font-size="12" font-weight="bold">
    上下文范围: start=1, end=4
  </text>
  
  <!-- 步骤4：结果组合 -->
  <text x="60" y="520" fill="#ffffff" font-size="18" font-weight="bold">步骤4：上下文增强结果</text>
  
  <!-- 箭头指向结果 -->
  <path d="M 300 460 L 300 540" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="150" y="550" width="300" height="100" rx="8" fill="url(#resultGrad)" stroke="#ffffff" stroke-width="2"/>
  <text x="300" y="575" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">增强的上下文结果</text>
  <text x="300" y="595" text-anchor="middle" fill="#ffffff" font-size="10">片段1: 算法是计算机科学的基础...</text>
  <text x="300" y="610" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">片段2: 机器学习是人工智能的分支...</text>
  <text x="300" y="625" text-anchor="middle" fill="#ffffff" font-size="10">片段3: 深度学习是机器学习的子集...</text>
  <text x="300" y="640" text-anchor="middle" fill="#ffffff" font-size="9">连贯的上下文信息，提供更完整的答案</text>
  
  <!-- 右侧代码逻辑说明 -->
  <text x="600" y="100" fill="#ffffff" font-size="18" font-weight="bold">核心算法逻辑</text>
  
  <!-- 代码步骤1 -->
  <rect x="600" y="120" width="550" height="60" rx="6" fill="#2d2d2d" stroke="#555555" stroke-width="1"/>
  <text x="620" y="140" fill="#ffcc00" font-size="11" font-weight="bold">1. 查询向量化</text>
  <text x="620" y="155" fill="#cccccc" font-size="10">query_embedding = create_embeddings(query).data[0].embedding</text>
  <text x="620" y="170" fill="#888888" font-size="9">将用户查询转换为向量表示</text>
  
  <!-- 代码步骤2 -->
  <rect x="600" y="200" width="550" height="80" rx="6" fill="#2d2d2d" stroke="#555555" stroke-width="1"/>
  <text x="620" y="220" fill="#ffcc00" font-size="11" font-weight="bold">2. 相似度计算</text>
  <text x="620" y="235" fill="#cccccc" font-size="10">similarity_score = cosine_similarity(query_embedding, chunk_embedding)</text>
  <text x="620" y="250" fill="#cccccc" font-size="10">similarity_scores.append((i, similarity_score))</text>
  <text x="620" y="265" fill="#888888" font-size="9">计算查询与每个文档片段的余弦相似度</text>
  
  <!-- 代码步骤3 -->
  <rect x="600" y="300" width="550" height="80" rx="6" fill="#2d2d2d" stroke="#555555" stroke-width="1"/>
  <text x="620" y="320" fill="#ffcc00" font-size="11" font-weight="bold">3. 排序与选择</text>
  <text x="620" y="335" fill="#cccccc" font-size="10">similarity_scores.sort(key=lambda x: x[1], reverse=True)</text>
  <text x="620" y="350" fill="#cccccc" font-size="10">top_index = similarity_scores[0][0]</text>
  <text x="620" y="365" fill="#888888" font-size="9">按相似度降序排序，获取最佳匹配片段索引</text>
  
  <!-- 代码步骤4 -->
  <rect x="600" y="400" width="550" height="100" rx="6" fill="#2d2d2d" stroke="#555555" stroke-width="1"/>
  <text x="620" y="420" fill="#ffcc00" font-size="11" font-weight="bold">4. 上下文扩展</text>
  <text x="620" y="435" fill="#cccccc" font-size="10">start = max(0, top_index - context_size)</text>
  <text x="620" y="450" fill="#cccccc" font-size="10">end = min(len(text_chunks), top_index + context_size + 1)</text>
  <text x="620" y="465" fill="#cccccc" font-size="10">return [text_chunks[i] for i in range(start, end)]</text>
  <text x="620" y="485" fill="#888888" font-size="9">扩展邻近片段，确保边界安全，返回完整上下文</text>
  
  <!-- 优势说明 -->
  <rect x="600" y="520" width="550" height="120" rx="6" fill="#1a4a1a" stroke="#51cf66" stroke-width="2"/>
  <text x="620" y="540" fill="#51cf66" font-size="14" font-weight="bold">上下文增强的优势</text>
  <text x="620" y="560" fill="#ffffff" font-size="11">• 提供连贯的上下文信息，避免信息碎片化</text>
  <text x="620" y="580" fill="#ffffff" font-size="11">• 包含邻近片段，确保回答的完整性</text>
  <text x="620" y="600" fill="#ffffff" font-size="11">• 智能边界处理，避免索引越界</text>
  <text x="620" y="620" fill="#ffffff" font-size="11">• 可配置的上下文大小，灵活适应不同需求</text>
  
  <!-- 示例说明 -->
  <text x="60" y="700" fill="#ffffff" font-size="16" font-weight="bold">实际应用示例</text>
  
  <rect x="60" y="720" width="1080" height="80" rx="8" fill="#2a2a2a" stroke="#666666" stroke-width="1"/>
  <text x="80" y="740" fill="#ffcc00" font-size="12" font-weight="bold">查询: "什么是机器学习？"</text>
  <text x="80" y="755" fill="#ffffff" font-size="10">传统RAG: 只返回片段2的内容 → 回答可能不够完整</text>
  <text x="80" y="770" fill="#51cf66" font-size="10">上下文增强RAG: 返回片段1+2+3 → 从算法基础到机器学习再到深度学习的完整知识链</text>
  <text x="80" y="785" fill="#888888" font-size="9">结果：用户获得更全面、更连贯的答案，理解更深入</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>
  
  <!-- 连接线 -->
  <path d="M 420 150 L 520 150 Q 540 150 540 170 L 540 250" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <text x="545" y="200" fill="#888888" font-size="9">相似度计算</text>
  
</svg>