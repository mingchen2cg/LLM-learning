<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- 标题 -->
  <text x="400" y="30" font-size="24" text-anchor="middle" font-weight="bold">数据块切分（Chunking）方法</text>
  
  <!-- 原始文档 -->
  <rect x="50" y="70" width="700" height="60" rx="5" ry="5" fill="#E0E0E0" stroke="#000000" stroke-width="1"/>
  <text x="400" y="105" font-size="16" text-anchor="middle">原始文档 (Raw Document)</text>
  
  <!-- 箭头 -->
  <path d="M400 130 L400 170" stroke="#000000" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 基于规则切分 -->
  <rect x="100" y="170" width="260" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="2"/>
  <text x="230" y="195" font-size="16" text-anchor="middle">基于规则的切分</text>
  
  <!-- 基于语义切分 -->
  <rect x="440" y="170" width="260" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="2"/>
  <text x="570" y="195" font-size="16" text-anchor="middle">基于语义的切分</text>
  
  <!-- 箭头 -->
  <path d="M230 210 L230 240" stroke="#388E3C" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M570 210 L570 240" stroke="#1976D2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 固定长度切分 -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="100" height="60" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <rect x="110" y="0" width="100" height="60" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <rect x="220" y="0" width="100" height="60" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <text x="160" y="35" font-size="14" text-anchor="middle">固定长度切分</text>
    
    <!-- 长度示意 -->
    <line x1="0" y1="70" x2="100" y2="70" stroke="#388E3C" stroke-width="1"/>
    <line x1="110" y1="70" x2="210" y2="70" stroke="#388E3C" stroke-width="1"/>
    <line x1="220" y1="70" x2="320" y2="70" stroke="#388E3C" stroke-width="1"/>
    <text x="50" y="85" font-size="10" text-anchor="middle">固定大小</text>
    <text x="160" y="85" font-size="10" text-anchor="middle">固定大小</text>
    <text x="270" y="85" font-size="10" text-anchor="middle">固定大小</text>
  </g>
  
  <!-- 结构化切分 -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="160" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <rect x="170" y="0" width="70" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <rect x="250" y="0" width="100" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <text x="160" y="65" font-size="14" text-anchor="middle">结构化文档切分 (段落、章节)</text>
    
    <!-- 结构示意 -->
    <text x="80" y="25" font-size="12" text-anchor="middle">段落1</text>
    <text x="205" y="25" font-size="12" text-anchor="middle">标题</text>
    <text x="300" y="25" font-size="12" text-anchor="middle">段落2</text>
  </g>
  
  <!-- 滑动窗口切分 -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1"/>
    <rect x="100" y="0" width="120" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1" opacity="0.7"/>
    <rect x="200" y="0" width="120" height="40" rx="5" ry="5" fill="#C8E6C9" stroke="#388E3C" stroke-width="1" opacity="0.7"/>
    <text x="160" y="65" font-size="14" text-anchor="middle">滑动窗口切分 (有重叠)</text>
    
    <!-- 重叠区域 -->
    <rect x="100" y="0" width="20" height="40" fill="#388E3C" opacity="0.3"/>
    <rect x="200" y="0" width="20" height="40" fill="#388E3C" opacity="0.3"/>
  </g>
  
  <!-- 主题边界切分 -->
  <g transform="translate(430, 240)">
    <rect x="0" y="0" width="110" height="60" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <rect x="120" y="0" width="170" height="60" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <text x="140" y="35" font-size="14" text-anchor="middle">主题边界检测切分</text>
    
    <!-- 主题边界示意 -->
    <text x="55" y="85" font-size="10" text-anchor="middle">主题A</text>
    <text x="205" y="85" font-size="10" text-anchor="middle">主题B</text>
    <line x1="110" y1="30" x2="120" y2="30" stroke="#1976D2" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="115" y="20" font-size="10" text-anchor="middle">主题</text>
    <text x="115" y="30" font-size="10" text-anchor="middle">边界</text>
  </g>
  
  <!-- 语义相似度切分 -->
  <g transform="translate(430, 350)">
    <rect x="0" y="0" width="70" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <rect x="80" y="0" width="100" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <rect x="190" y="0" width="110" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <text x="140" y="65" font-size="14" text-anchor="middle">语义相似度指导切分</text>
    
    <!-- 语义变化示意 -->
    <path d="M70 20 L80 20" stroke="#1976D2" stroke-width="2" stroke-dasharray="2,2"/>
    <path d="M180 20 L190 20" stroke="#1976D2" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="75" y="10" font-size="8" text-anchor="middle">语义</text>
    <text x="75" y="18" font-size="8" text-anchor="middle">变化</text>
    <text x="185" y="10" font-size="8" text-anchor="middle">语义</text>
    <text x="185" y="18" font-size="8" text-anchor="middle">变化</text>
  </g>
  
  <!-- 实体关系切分 -->
  <g transform="translate(430, 440)">
    <rect x="0" y="0" width="140" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <rect x="150" y="0" width="140" height="40" rx="5" ry="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="1"/>
    <text x="140" y="65" font-size="14" text-anchor="middle">实体关系保留切分</text>
    
    <!-- 实体关系示意 -->
    <ellipse cx="40" cy="20" rx="20" ry="12" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
    <ellipse cx="100" cy="20" rx="20" ry="12" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
    <line x1="60" y1="20" x2="80" y2="20" stroke="#0288D1" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="40" y="23" font-size="8" text-anchor="middle">实体A</text>
    <text x="100" y="23" font-size="8" text-anchor="middle">实体B</text>
    
    <ellipse cx="190" cy="20" rx="20" ry="12" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
    <ellipse cx="250" cy="20" rx="20" ry="12" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
    <line x1="210" y1="20" x2="230" y2="20" stroke="#0288D1" stroke-width="1" marker-end="url(#arrowhead)"/>
    <text x="190" y="23" font-size="8" text-anchor="middle">实体C</text>
    <text x="250" y="23" font-size="8" text-anchor="middle">实体D</text>
  </g>
  
  <!-- 混合方法 -->
  <rect x="50" y="520" width="700" height="40" rx="5" ry="5" fill="#FFECB3" stroke="#FFA000" stroke-width="2"/>
  <text x="400" y="545" font-size="16" text-anchor="middle">混合切分方法 (结合规则与语义)</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000000" />
    </marker>
  </defs>
</svg>
